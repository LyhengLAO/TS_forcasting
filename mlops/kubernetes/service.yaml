apiVersion: v1
kind: Service
metadata:
  name: ts-forecast-service
  namespace: default
  labels:
    app: ts-forecast
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "8000"
    prometheus.io/path:   "/metrics"
spec:
  selector:
    app: ts-forecast
  ports:
    - name: http
      protocol:   TCP
      port:       80
      targetPort: 8000
    - name: metrics
      protocol:   TCP
      port:       9091
      targetPort: 8000
  type: ClusterIP   # LoadBalancer si cloud (AWS/GCP/Azure)
---
# Optionnel : Ingress pour exposer l'API en externe
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ts-forecast-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  rules:
    - host: ts-forecast.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ts-forecast-service
                port:
                  number: 80
